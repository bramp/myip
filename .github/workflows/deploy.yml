name: Deploy to App Engine

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Update Version in code
        run: |
          VERSION=$(git describe --long --tags --dirty --always)
          BUILD_TIME=$(date '+%Y-%m-%d %T %Z')
          sed -i "s/\(Version[^\"]*\"\)[^\"]*/\1$VERSION/" appengine/version.go
          sed -i "s/\(BuildTime[^\"]*\"\)[^\"]*/\1$BUILD_TIME/" appengine/version.go

      - name: 'Check secrets'
        env:
          WIF_PROVIDER_NAME: ${{ secrets.WIF_PROVIDER_NAME }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$WIF_PROVIDER_NAME" ]; then echo "WIF_PROVIDER_NAME secret is not set"; exit 1; fi
          if [ -z "$GCP_SERVICE_ACCOUNT" ]; then echo "GCP_SERVICE_ACCOUNT secret is not set"; exit 1; fi
          if [ -z "$GCP_PROJECT_ID" ]; then echo "GCP_PROJECT_ID secret is not set"; exit 1; fi

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER_NAME }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: 'latest'
          install_components: 'app-engine-go'

      - name: 'Deploy to App Engine'
        uses: 'google-github-actions/deploy-appengine@v3'
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'
          deliverables: 'appengine/app.yaml'
          promote: true
